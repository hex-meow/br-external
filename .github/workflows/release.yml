name: release

# Push a semver tag (e.g. v1.2.3) -> build the image and create a DRAFT release
# with the upgrade files attached. Draft = you review, then click Publish.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Reuse the full build (no duplication). Produces the "rootfs" artifact.
  build:
    uses: ./.github/workflows/build.yml
    # defconfig defaults to the public hexmeow_chassis_ctrl_defconfig.
    # TODO(private): add a second reusable-call for the superset defconfig once
    # the private overlay repo + a checkout secret exist, and attach its images
    # below as private-*. Its source stays out of this public repo.

  draft-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write            # required to create the release / upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist              # each artifact lands in dist/<artifact-name>/

      - name: Prefix public upgrade files
        run: |
          mkdir -p out
          for f in dist/rootfs/*; do
            cp "$f" "out/public-$(basename "$f")"
          done
          (cd out && sha256sum public-* > sha256sum-public.txt)
          ls -l out

      # Release ASSETS do not expire and do not count toward Actions storage,
      # unlike the build artifacts above (which cleanup-artifacts.yml prunes).
      - name: Create draft release
        uses: softprops/action-gh-release@v2   # pin to a commit SHA for supply-chain safety
        with:
          draft: true
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            out/public-*
            out/sha256sum-public.txt
