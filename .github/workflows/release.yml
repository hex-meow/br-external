name: release

# tag vX.Y.Z -> 构建公共镜像(+SDK 社区福利)与私有镜像,全部附到 DRAFT release。
# 人工点 Publish 即审核门 -> publish-r2.yml 才把镜像上传 downloads.hexmeow.com。
# 设计:robot-overall-design/08(v0.3) / 09。安全基线:action 钉 SHA、
# persist-credentials:false、显式文件清单、concurrency。
on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml

  draft-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
      - name: Stage public upgrade files + SDK
        run: |
          set -euo pipefail
          mkdir -p out
          for f in dist/rootfs/*; do cp "$f" "out/public-$(basename "$f")"; done
          # SDK = 社区福利(第三方对公共镜像编 glibc 应用);发布链不消费它。缺了就硬失败。
          cp dist/sdk/*_sdk-buildroot.tar.gz out/
          (cd out && sha256sum public-* > sha256sum-public.txt)
          ls -l out
      - name: Create draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            out/public-*
            out/*_sdk-buildroot.tar.gz
            out/sha256sum-public.txt

  # ---------------------------------------------------------------------------
  # 私有镜像:公共 defconfig + overlay 片段(CI 生成,无手工拷贝)+ 预置的
  # 静态 musl controller bundle。门控使 fork 恒为绿:
  #   - 仓库变量 BUILD_PRIVATE=true(fork 不继承 -> skip)
  #   - secret PRIVATE_ACCESS_TOKEN:只读 hex-meow/hex-controller 的
  #     fine-grained token(注意 contents:read 即源码钥匙,建议 GitHub App 短时 token)
  #   - 提交 controller-ref 文件(hex-controller 的 tag)后才设 BUILD_PRIVATE
  # ---------------------------------------------------------------------------
  private-image:
    if: ${{ github.repository == 'hex-meow/br-external' && vars.BUILD_PRIVATE == 'true' }}
    needs: draft-release
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    env:
      FORCE_UNSAFE_CONFIGURE: "1"
      BUILDROOT_VERSION: "2026.02.1"
      BR2_DL_DIR: ${{ github.workspace }}/dl
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }

      - name: Resolve controller ref (committed pin, linux-commit style)
        id: cref
        run: |
          [ -f controller-ref ] || { echo "::error::controller-ref 不存在。先提交它(hex-controller 的 tag)再设 vars.BUILD_PRIVATE"; exit 1; }
          echo "ref=$(cat controller-ref | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # 只取 overlay 目录:controller 源码不进公共 runner(R1)。
      - name: Checkout private overlay (sparse)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: hex-meow/hex-controller
          token: ${{ secrets.PRIVATE_ACCESS_TOKEN }}
          ref: ${{ steps.cref.outputs.ref }}
          path: private-src
          sparse-checkout: buildroot-overlay
          persist-credentials: false

      - name: Assert overlay pin consistency
        run: |
          REF="${{ steps.cref.outputs.ref }}"
          V=$(grep -oP 'HEX_CONTROLLER_VERSION\s*=\s*\K\S+' \
                private-src/buildroot-overlay/package/hex-controller/hex-controller.mk)
          [ "$V" = "$REF" ] || { echo "::error::overlay .mk VERSION=$V != controller-ref $REF"; exit 1; }

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache /usr/local/.ghcup \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash bc bison build-essential ca-certificates ccache cpio curl \
            file flex gawk git gzip libncurses-dev libssl-dev locales make \
            patch perl python3 rsync sed tar unzip wget xz-utils zstd
          sudo locale-gen en_US.UTF-8

      - name: Cache dl/ + ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            dl
            ~/.buildroot-ccache
          key: br-priv-${{ hashFiles('configs/hexmeow_chassis_ctrl_defconfig', 'linux-commit', 'controller-ref') }}
          restore-keys: |
            br-priv-
            br-ccache-

      - name: Fetch controller bundle (pre-seed BR2_DL_DIR)
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_ACCESS_TOKEN }}
        run: |
          REF="${{ steps.cref.outputs.ref }}"
          mkdir -p "$BR2_DL_DIR/hex-controller"
          gh release download "$REF" -R hex-meow/hex-controller \
            -p "hex-controller-$REF-aarch64.tar.gz" \
            -O "$BR2_DL_DIR/hex-controller/hex-controller-$REF-aarch64.tar.gz"

      # 轻量兼容闸门(ABI 闸门随 musl 消失,08 v0.3):
      #  - zenoh client(bundle)与镜像 zenohd 必须同版(硬失败)
      #  - proto pin 不一致只告警(契约演进是纯增量,01)
      - name: Compatibility assertions (BUILD_INFO)
        run: |
          REF="${{ steps.cref.outputs.ref }}"
          tar xzf "$BR2_DL_DIR/hex-controller/hex-controller-$REF-aarch64.tar.gz" \
              --wildcards -O "*/BUILD_INFO" > build_info
          cat build_info
          BZ=$(grep -oP '^zenoh=\K.+' build_info)
          IZ=$(grep -oP 'ZENOHD_VERSION = \K.+' package/zenohd/zenohd.mk)
          [ "$BZ" = "$IZ" ] || { echo "::error::bundle zenoh=$BZ != 镜像 zenohd=$IZ"; exit 1; }
          BP=$(grep -oP '^hex-robot-proto=\K.+' build_info)
          IP=$(grep -oP 'HEX_ROBOT_PROTO_VERSION = \K.+' package/hex-robot-proto/hex-robot-proto.mk)
          [ "$BP" = "$IP" ] || echo "::warning::proto pin 不一致 bundle=$BP image=$IP(纯增量演进下可接受)"

      - name: Build private image (public defconfig + fragment)
        run: |
          git clone --depth=1 https://github.com/buildroot/buildroot -b "$BUILDROOT_VERSION" buildroot
          ( cd buildroot && git apply "$GITHUB_WORKSPACE/0001-package-mesa3d-allow-gallium-panfrost-without-target.patch" )
          mkdir -p ~/.buildroot-ccache && echo 'max_size = 2.0G' > ~/.buildroot-ccache/ccache.conf
          make -C buildroot \
            BR2_EXTERNAL="$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/private-src/buildroot-overlay" \
            hexmeow_chassis_ctrl_defconfig
          cat private-src/buildroot-overlay/configs/private-fragment.config >> buildroot/.config
          make -C buildroot olddefconfig
          grep -q '^BR2_PACKAGE_HEX_CONTROLLER=y' buildroot/.config || { echo "::error::fragment 未生效"; exit 1; }
          make -C buildroot

      - name: Stage private upgrade files
        run: |
          set -euo pipefail
          mkdir -p out
          for f in buildroot/output/images/rootfs.ext2.zst buildroot/output/images/rootfs.erofs; do
            cp "$f" "out/private-$(basename "$f")"
          done
          (cd out && sha256sum private-* > sha256sum-private.txt)

      - name: Append private assets to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            out/private-*
            out/sha256sum-private.txt
