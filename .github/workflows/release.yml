name: release

# Push a semver tag (e.g. v1.2.3) -> build the image and create a DRAFT release
# with the upgrade files attached. Draft = you review, then click Publish.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Reuse the full public build (no duplication). Produces "rootfs" + "sdk".
  build:
    uses: ./.github/workflows/build.yml

  draft-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write            # required to create the release / upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist              # each artifact lands in dist/<artifact-name>/

      - name: Stage public upgrade files + SDK
        run: |
          mkdir -p out
          for f in dist/rootfs/*; do cp "$f" "out/public-$(basename "$f")"; done
          # The SDK (relocatable toolchain+sysroot) is a release asset so the
          # private hex-controller repo's CI can cross-compile against it.
          cp dist/sdk/*_sdk-buildroot.tar.gz out/ 2>/dev/null || true
          (cd out && sha256sum public-* > sha256sum-public.txt)
          ls -l out

      # Release ASSETS do not expire and do not count toward Actions storage,
      # unlike the build artifacts above (which cleanup-artifacts.yml prunes).
      - name: Create draft release
        uses: softprops/action-gh-release@v2   # pin to a commit SHA for supply-chain safety
        with:
          draft: true
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            out/public-*
            out/*_sdk-buildroot.tar.gz
            out/sha256sum-public.txt

  # ---------------------------------------------------------------------------
  # Private image: builds the superset defconfig (public + hex-controller) using
  # the PRIVATE overlay, and appends its rootfs to the same draft release.
  #
  # Gated so it is a no-op for forks / anyone without access:
  #   - set repo VARIABLE  BUILD_PRIVATE = true
  #   - set repo SECRET    PRIVATE_ACCESS_TOKEN  (fine-grained PAT or App token
  #     with read access to hex-meow/br-external-private and hex-meow/hex-controller)
  # The controller SOURCE never enters this repo — only the prebuilt bundle is
  # pulled, and only the built rootfs is published.
  # ---------------------------------------------------------------------------
  private-image:
    if: ${{ github.repository == 'hex-meow/br-external' && vars.BUILD_PRIVATE == 'true' }}
    needs: draft-release          # release exists first; this appends to it
    runs-on: ubuntu-latest         # switch to [self-hosted, linux] if disk/time is tight
    timeout-minutes: 350
    permissions:
      contents: write
    env:
      FORCE_UNSAFE_CONFIGURE: "1"
      BUILDROOT_VERSION: "2026.02.1"
      BR2_DL_DIR: ${{ github.workspace }}/dl
      HEX_CONTROLLER_TAG: v0.0.1   # bump to the hex-controller release you want
    steps:
      - uses: actions/checkout@v4          # public br-external (self)

      - name: Checkout private overlay
        uses: actions/checkout@v4
        with:
          repository: hex-meow/br-external-private
          token: ${{ secrets.PRIVATE_ACCESS_TOKEN }}
          path: private-overlay

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash bc bison build-essential ca-certificates ccache cpio curl \
            file flex gawk git gzip libncurses-dev libssl-dev locales make \
            patch perl python3 rsync sed tar unzip wget xz-utils zstd
          sudo locale-gen en_US.UTF-8

      - name: Cache dl/ + ccache
        uses: actions/cache@v4
        with:
          path: |
            dl
            ~/.buildroot-ccache
          key: br-priv-${{ hashFiles('private-overlay/configs/hexmeow_private_defconfig', 'linux-commit') }}
          restore-keys: br-priv-

      # Pre-download the private controller bundle into the package dl dir
      # (buildroot's wget can't authenticate to a private release).
      - name: Fetch hex-controller bundle
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_ACCESS_TOKEN }}
        run: |
          mkdir -p "$BR2_DL_DIR/hex-controller"
          gh release download "$HEX_CONTROLLER_TAG" -R hex-meow/hex-controller \
            -p 'hex-controller-*-aarch64.tar.gz' \
            -O "$BR2_DL_DIR/hex-controller/hex-controller-${HEX_CONTROLLER_TAG}-aarch64.tar.gz"

      - name: Build private image
        run: |
          git clone --depth=1 https://github.com/buildroot/buildroot -b "$BUILDROOT_VERSION" buildroot
          ( cd buildroot && git apply "${GITHUB_WORKSPACE}/0001-package-mesa3d-allow-gallium-panfrost-without-target.patch" )
          mkdir -p ~/.buildroot-ccache && echo 'max_size = 2.0G' > ~/.buildroot-ccache/ccache.conf
          make -C buildroot \
            BR2_EXTERNAL="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/private-overlay" \
            hexmeow_private_defconfig
          make -C buildroot

      - name: Stage private upgrade files
        run: |
          mkdir -p out
          for f in buildroot/output/images/rootfs.ext2.zst buildroot/output/images/rootfs.erofs; do
            [ -f "$f" ] && cp "$f" "out/private-$(basename "$f")"
          done
          (cd out && sha256sum private-* > sha256sum-private.txt)

      # Publish the private image publicly to Cloudflare R2 (downloads.hexmeow.com).
      # Gated on the R2_BUCKET repo VARIABLE; skips cleanly until you configure R2.
      # Secrets: R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
      # (R2 S3 API token, "Object Read & Write", scoped to the one bucket).
      - name: Publish images to Cloudflare R2
        if: ${{ vars.R2_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
          EP: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ vars.R2_BUCKET }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          IMG=buildroot/output/images
          work="$RUNNER_TEMP/r2/$TAG"; mkdir -p "$work"
          cp "$IMG/rootfs.ext2.zst" "$IMG/rootfs.erofs" "$work/"
          ( cd "$work"
            for f in rootfs.ext2.zst rootfs.erofs; do sha256sum "$f" | awk '{print $1}' > "$f.sha256"; done
            e2s=$(cat rootfs.ext2.zst.sha256); e2b=$(stat -c%s rootfs.ext2.zst)
            efs=$(cat rootfs.erofs.sha256);    efb=$(stat -c%s rootfs.erofs)
            printf '{"product":"br-external","version":"%s","released":"%s","images":{"ext2":{"url":"releases/%s/rootfs.ext2.zst","sha256":"%s","bytes":%s},"erofs":{"url":"releases/%s/rootfs.erofs","sha256":"%s","bytes":%s}}}\n' \
              "$TAG" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$TAG" "$e2s" "$e2b" "$TAG" "$efs" "$efb" > manifest.json )
          up() { aws s3 cp "$1" "$2" --endpoint-url "$EP" --content-type "$3" --cache-control "$4"; }
          IMM="public, max-age=31536000, immutable"
          for f in rootfs.ext2.zst rootfs.erofs; do
            up "$work/$f"        "s3://$BUCKET/br-external/releases/$TAG/$f"        application/octet-stream "$IMM"
            up "$work/$f.sha256" "s3://$BUCKET/br-external/releases/$TAG/$f.sha256" text/plain               "$IMM"
          done
          up "$work/manifest.json" "s3://$BUCKET/br-external/releases/$TAG/manifest.json" application/json "$IMM"
          up "$work/manifest.json" "s3://$BUCKET/br-external/latest.json"                 application/json "no-cache"
          # regenerate the human-browsable index from the release list
          vers=$(aws s3 ls "s3://$BUCKET/br-external/releases/" --endpoint-url "$EP" | awk '{print $2}' | tr -d / | sort -rV)
          { echo '<!doctype html><meta charset=utf-8><title>br-external images</title><h1>br-external releases</h1><ul>'
            for v in $vers; do
              echo "<li><b>$v</b> — <a href=\"releases/$v/rootfs.ext2.zst\">ext2</a> · <a href=\"releases/$v/rootfs.erofs\">erofs</a> · <a href=\"releases/$v/manifest.json\">manifest</a></li>"
            done
            echo '</ul>'; } > "$work/index.html"
          up "$work/index.html" "s3://$BUCKET/br-external/index.html" text/html "no-cache"

      - name: Append private assets to the release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          files: |
            out/private-*
            out/sha256sum-private.txt
