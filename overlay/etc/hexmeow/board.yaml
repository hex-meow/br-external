# 板卡配置(hex-hw-supervisor 的唯一事实源,09 §2):这块板有哪些 controller 级硬件。
# 镜像变体安装为 /etc/hexmeow/board.yaml。
# 出厂后可改(09 §13.1):写入 + sync 后【断电重启生效】,supervisor 不做热 reload。
#
# 三态语义(01):列在这里 = "支持"(hw/info 可见);对应 key 的 liveliness = "在不在"。

zenoh:
  connect: "tcp/127.0.0.1:7447"   # 本机 router(镜像的 zenohd.service)

resources:
  imu0:
    kind: imu        # 消息类型 ImuData,key = <vendor>/<cid>/hw/imu0
    driver: mock     # 真驱动(qmi8658 I2C 等)待最终版 PCB/设备树 —— P3b TODO
    rate_hz: 100
  estop0:
    kind: estop      # EstopState;mock 驱动用 /run/hexmeow/mock-estop 文件 touch/rm 触发
    driver: mock
  remote0:
    kind: remote     # RemoteState;真驱动(evdev/SBUS)待最终版 PCB —— P3b TODO
    driver: mock
  vbus0:
    kind: vbus       # VbusState;能测总线电压的板卡变体才写
    driver: mock
